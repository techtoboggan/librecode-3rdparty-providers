name: Publish provider packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-providers:
    name: Publish ${{ matrix.package.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        package:
          - { dir: "packages/provider-anthropic", name: "@librecode/provider-anthropic" }
          - { dir: "packages/provider-openai", name: "@librecode/provider-openai" }
          - { dir: "packages/provider-openrouter", name: "@librecode/provider-openrouter" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Prepare for publish
        run: |
          node -e "
          // Remove workspace root so npm install doesn't resolve workspace:* deps
          const root = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
          delete root.workspaces;
          require('fs').writeFileSync('package.json', JSON.stringify(root, null, 2));

          // Rewrite package exports and version
          const pkgPath = '${{ matrix.package.dir }}/package.json';
          const pkg = JSON.parse(require('fs').readFileSync(pkgPath, 'utf8'));
          for (const [key, value] of Object.entries(pkg.exports || {})) {
            if (typeof value === 'string') {
              const file = value.replace('./src/', './dist/').replace('.ts', '');
              pkg.exports[key] = { import: file + '.js', types: file + '.d.ts' };
            }
          }
          const tag = process.env.GITHUB_REF_NAME || '';
          if (tag.startsWith('v')) pkg.version = tag.slice(1);
          pkg.repository = { type: 'git', url: 'https://github.com/techtoboggan/librecode-3rdparty-providers.git' };
          require('fs').writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
          console.log('Prepared ' + pkg.name + '@' + pkg.version);
          "

      - name: Install dependencies
        # @librecode/plugin may not be on npm yet if this fires before the main
        # repo publish workflow completes. Retry up to 5 times (5 min total).
        run: |
          for i in 1 2 3 4 5; do
            npm install && break
            echo "Attempt $i failed, retrying in 60s..."
            sleep 60
          done
        working-directory: ${{ matrix.package.dir }}

      - name: Build
        run: npx tsc
        working-directory: ${{ matrix.package.dir }}

      - name: Publish
        working-directory: ${{ matrix.package.dir }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-bundle:
    name: Publish @librecode/provider-bundle
    needs: publish-providers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Prepare for publish
        run: |
          node -e "
          // Remove workspace root so npm install doesn't resolve workspace:* deps
          const root = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
          delete root.workspaces;
          require('fs').writeFileSync('package.json', JSON.stringify(root, null, 2));

          // Rewrite package exports, version, and workspace deps
          const pkgPath = 'packages/provider-bundle/package.json';
          const pkg = JSON.parse(require('fs').readFileSync(pkgPath, 'utf8'));
          for (const [key, value] of Object.entries(pkg.exports || {})) {
            if (typeof value === 'string') {
              const file = value.replace('./src/', './dist/').replace('.ts', '');
              pkg.exports[key] = { import: file + '.js', types: file + '.d.ts' };
            }
          }
          const tag = process.env.GITHUB_REF_NAME || '';
          const version = tag.startsWith('v') ? tag.slice(1) : '0.1.0';
          pkg.version = version;
          for (const [k, v] of Object.entries(pkg.dependencies || {})) {
            if (typeof v === 'string' && v.startsWith('workspace:')) {
              pkg.dependencies[k] = '^' + version;
            }
          }
          pkg.repository = { type: 'git', url: 'https://github.com/techtoboggan/librecode-3rdparty-providers.git' };
          require('fs').writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
          console.log('Prepared ' + pkg.name + '@' + pkg.version);
          "

      - name: Install dependencies
        run: |
          for i in 1 2 3 4 5; do
            npm install && break
            echo "Attempt $i failed, retrying in 60s..."
            sleep 60
          done
        working-directory: packages/provider-bundle

      - name: Build
        run: npx tsc
        working-directory: packages/provider-bundle

      - name: Publish
        working-directory: packages/provider-bundle
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Publish provider packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  detect-changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.changes.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find packages to publish
        id: changes
        run: |
          # On tag push, publish all packages. On manual dispatch, also publish all.
          packages=$(ls -d packages/provider-*/package.json | while read f; do
            dir=$(dirname "$f")
            name=$(node -e "console.log(require('./$f').name)")
            echo "{\"dir\":\"$dir\",\"name\":\"$name\"}"
          done | jq -s -c '.')
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "Will publish: $packages"

  publish:
    name: Publish ${{ matrix.package.name }}
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install
        working-directory: ${{ matrix.package.dir }}

      - name: Build
        run: npx tsc
        working-directory: ${{ matrix.package.dir }}

      - name: Prepare package.json for publish
        working-directory: ${{ matrix.package.dir }}
        run: |
          node -e "
          const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
          for (const [key, value] of Object.entries(pkg.exports || {})) {
            if (typeof value === 'string') {
              const file = value.replace('./src/', './dist/').replace('.ts', '');
              pkg.exports[key] = { import: file + '.js', types: file + '.d.ts' };
            }
          }
          // Use tag version if available
          const tag = process.env.GITHUB_REF_NAME || '';
          if (tag.startsWith('v')) pkg.version = tag.slice(1);
          // Convert workspace deps to real versions
          for (const [k, v] of Object.entries(pkg.dependencies || {})) {
            if (typeof v === 'string' && v.startsWith('workspace:')) {
              pkg.dependencies[k] = '^0.1.0';
            }
          }
          require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('Publishing ' + pkg.name + '@' + pkg.version);
          "

      - name: Publish
        working-directory: ${{ matrix.package.dir }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ""
